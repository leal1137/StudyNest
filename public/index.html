<!DOCTYPE html>
<html>
<head>
  <title>StudyNest Simple</title>
</head>
<body>
  <h1>Study Room</h1>s

  <input id="username" placeholder="Username" />
  <input id="room" placeholder="Room" />
  <button onclick="joinRoom()">Join Room</button>

  <div id="chat" style="margin-top:20px;"></div>

  <input id="message" placeholder="Message" />
  <button onclick="sendMessage()">Send</button>

  <!--Nytt-->
  <div id="connection-warning" style="
      display: none; 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      background-color: #ff9800; 
      color: white; 
      text-align: center; 
      padding: 10px; 
      z-index: 9999; 
      font-family: sans-serif;
  ">
      Anslutningen till servern är bryten
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <!--Nytt-->
  <script src="script.js"></script>
  <script>
    const socket = io();

    function joinRoom() {
      const username = document.getElementById('username').value;
      const room = document.getElementById('room').value;
      socket.emit('join_room', { username, room });
    }

    function sendMessage() {
      const message = document.getElementById('message').value;
      socket.emit('send_message', message);
    }

    socket.on('receive_message', (data) => {
      const chat = document.getElementById('chat');
      chat.innerHTML += `<p><b>${data.username}:</b> ${data.message}</p>`;
    });

    socket.on('user_joined', (username) => {
      const chat = document.getElementById('chat');
      chat.innerHTML += `<p><i>${username} joined</i></p>`;
    });

    socket.on('joined_room', (data) => {
      const chat = document.getElementById('chat');
      chat.innerHTML += `<p><b>You joined room ${data.room}</b></p>`;
    });

    socket.on('user_left', (username) => {
      const chat = document.getElementById('chat');
      chat.innerHTML += `<p><i>${username} left</i></p>`;
    });
  </script>
</body>
</html>
